name: deploy

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Decide whether to publish
        id: version_check
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require("node:child_process");
            const pkg = require(`${process.env.GITHUB_WORKSPACE}/package.json`);

            const extractSemver = (value) => {
              if (!value) return "";
              const match = String(value).match(/(\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?)/);
              return match ? match[1] : "";
            };

            const parseIdentifier = (id) => (/^[0-9]+$/.test(id) ? Number(id) : id);

            const comparePrerelease = (a, b) => {
              const aParts = a ? a.split(".") : [];
              const bParts = b ? b.split(".") : [];
              const len = Math.max(aParts.length, bParts.length);

              for (let i = 0; i < len; i++) {
                const aPart = aParts[i];
                const bPart = bParts[i];

                if (aPart === undefined) return -1;
                if (bPart === undefined) return 1;

                const aParsed = parseIdentifier(aPart);
                const bParsed = parseIdentifier(bPart);

                if (typeof aParsed === "number" && typeof bParsed === "number") {
                  if (aParsed !== bParsed) return aParsed > bParsed ? 1 : -1;
                  continue;
                }

                if (typeof aParsed === "number") return -1;
                if (typeof bParsed === "number") return 1;

                if (aParsed !== bParsed) return aParsed > bParsed ? 1 : -1;
              }

              return 0;
            };

            const compareSemver = (a, b) => {
              const [aCore, aPre = ""] = a.split("-");
              const [bCore, bPre = ""] = b.split("-");
              const aNums = aCore.split(".").map((part) => Number(part));
              const bNums = bCore.split(".").map((part) => Number(part));

              for (let i = 0; i < 3; i++) {
                const av = aNums[i] ?? 0;
                const bv = bNums[i] ?? 0;
                if (av !== bv) return av > bv ? 1 : -1;
              }

              if (!aPre && !bPre) return 0;
              if (!aPre) return 1;
              if (!bPre) return -1;

              return comparePrerelease(aPre, bPre);
            };

            const packageVersion = extractSemver(pkg.version);
            if (!packageVersion) {
              core.setFailed(`Could not parse package version from package.json: ${pkg.version}`);
              return;
            }

            let latestReleaseTag = "";
            let latestReleaseVersion = "";

            try {
              const { data } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              latestReleaseTag = data.tag_name ?? "";
              latestReleaseVersion = extractSemver(latestReleaseTag);

              if (latestReleaseTag && !latestReleaseVersion) {
                core.setFailed(
                  `Latest release tag "${latestReleaseTag}" does not contain a semantic version.`,
                );
                return;
              }
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            let latestNpmVersion = "";
            try {
              latestNpmVersion = execSync(`npm view ${pkg.name} version`, {
                encoding: "utf8",
                stdio: ["ignore", "pipe", "pipe"],
              }).trim();
            } catch (error) {
              core.info(`Could not read npm version for ${pkg.name}. Assuming first publish.`);
            }

            const npmVersion = extractSemver(latestNpmVersion);

            const greaterThanRelease =
              !latestReleaseVersion || compareSemver(packageVersion, latestReleaseVersion) > 0;
            const greaterThanNpm = !npmVersion || compareSemver(packageVersion, npmVersion) > 0;
            const shouldPublish = greaterThanRelease && greaterThanNpm;

            core.info(
              [
                `package.json version: ${packageVersion}`,
                `latest GitHub release: ${latestReleaseTag || "(none)"}`,
                `latest npm version: ${npmVersion || "(none)"}`,
                `should publish: ${shouldPublish}`,
              ].join("\n"),
            );

            core.setOutput("package_name", pkg.name);
            core.setOutput("package_version", packageVersion);
            core.setOutput("latest_release_tag", latestReleaseTag);
            core.setOutput("latest_release_version", latestReleaseVersion);
            core.setOutput("latest_npm_version", npmVersion);
            core.setOutput("should_publish", shouldPublish ? "true" : "false");

      - name: Skip publish
        if: steps.version_check.outputs.should_publish != 'true'
        run: |
          echo "Skipping publish."
          echo "package.json version: ${{ steps.version_check.outputs.package_version }}"
          echo "latest GitHub release: ${{ steps.version_check.outputs.latest_release_tag }}"
          echo "latest npm version: ${{ steps.version_check.outputs.latest_npm_version }}"

      - name: Configure npm auth token for install
        if: steps.version_check.outputs.should_publish == 'true' && env.NPM_AUTH_TOKEN != ''
        run: echo "//registry.npmjs.org/:_authToken=${NPM_AUTH_TOKEN}" > ~/.npmrc

      - name: Install dependencies
        if: steps.version_check.outputs.should_publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: steps.version_check.outputs.should_publish == 'true'
        run: pnpm build

      - name: Install npm with trusted publishing support
        if: steps.version_check.outputs.should_publish == 'true' && env.NPM_AUTH_TOKEN == ''
        run: npm i -g npm@^11.5.2

      - name: Publish package with npm token
        if: steps.version_check.outputs.should_publish == 'true' && env.NPM_AUTH_TOKEN != ''
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_AUTH_TOKEN }}
        run: |
          PUBLISH_ARGS="--no-git-checks --access public"
          if [ "${{ github.event.repository.private }}" != "true" ]; then
            PUBLISH_ARGS="${PUBLISH_ARGS} --provenance"
          fi
          pnpm publish ${PUBLISH_ARGS}

      - name: Publish package with npm trusted publishing
        if: steps.version_check.outputs.should_publish == 'true' && env.NPM_AUTH_TOKEN == ''
        run: |
          PUBLISH_ARGS="--no-git-checks --access public"
          if [ "${{ github.event.repository.private }}" != "true" ]; then
            PUBLISH_ARGS="${PUBLISH_ARGS} --provenance"
          fi
          pnpm publish ${PUBLISH_ARGS}

      - name: Extract release notes from changelog
        if: steps.version_check.outputs.should_publish == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.version_check.outputs.package_version }}
        run: |
          if ! awk -v version="$PACKAGE_VERSION" '
            $0 ~ "^##[[:space:]]+"version"([[:space:]]|$)" {
              capture = 1
              found = 1
            }
            capture && $0 ~ "^##[[:space:]]+" && $0 !~ "^##[[:space:]]+"version"([[:space:]]|$)" {
              capture = 0
            }
            capture {
              print
            }
            END {
              if (!found) {
                exit 2
              }
            }
          ' CHANGELOG.md > release-notes.md; then
            echo "Could not find CHANGELOG.md entry for version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Validate release notes extraction
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          if [ ! -s release-notes.md ]; then
            echo "release-notes.md is empty"
            exit 1
          fi

      - name: Create GitHub release
        if: steps.version_check.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_check.outputs.package_version }}
          name: v${{ steps.version_check.outputs.package_version }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          generate_release_notes: true
